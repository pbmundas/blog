<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">Threat hunting feedback loop</title><desc id="d">Hypothesis, evidence, hunt, validate and improve detection form a cycle.</desc><rect width="1200" height="630" fill="#071827"/><g font-family="Arial,sans-serif" text-anchor="middle"><text x="600" y="80" fill="#fff" font-size="38" font-weight="700">The threat hunting feedback loop</text><g fill="#123653" stroke="#38bdf8" stroke-width="3"><rect x="70" y="245" width="190" height="100" rx="18"/><rect x="295" y="245" width="190" height="100" rx="18"/><rect x="520" y="245" width="160" height="100" rx="18"/><rect x="715" y="245" width="190" height="100" rx="18"/><rect x="940" y="245" width="190" height="100" rx="18"/></g><g fill="#fff" font-size="23" font-weight="700"><text x="165" y="305">Hypothesis</text><text x="390" y="305">Evidence</text><text x="600" y="305">Hunt</text><text x="810" y="305">Validate</text><text x="1035" y="290">Improve</text><text x="1035" y="320">detection</text></g><g fill="#38bdf8" font-size="34"><text x="278" y="310">→</text><text x="503" y="310">→</text><text x="698" y="310">→</text><text x="923" y="310">→</text></g><path d="M1035 375 C1035 510 165 510 165 375" fill="none" stroke="#fbbf24" stroke-width="5"/><text x="600" y="485" fill="#fbbf24" font-size="24">Every result creates a stronger next question</text></g></svg>
