<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Anatomy of a hunt hypothesis"><rect width="1200" height="630" fill="#071827"/><g font-family="Arial" text-anchor="middle"><text x="600" y="70" fill="white" font-size="38" font-weight="700">A hypothesis must point to observable evidence</text><g fill="#123653" stroke="#38bdf8" stroke-width="3"><rect x="80" y="210" width="260" height="140" rx="18"/><rect x="470" y="210" width="260" height="140" rx="18"/><rect x="860" y="210" width="260" height="140" rx="18"/></g><g fill="white" font-size="25" font-weight="700"><text x="210" y="270">Behavior</text><text x="210" y="310">What happens?</text><text x="600" y="270">Context</text><text x="600" y="310">Where and when?</text><text x="990" y="270">Evidence</text><text x="990" y="310">What would we see?</text></g><g fill="#fbbf24" font-size="40"><text x="405" y="295">+</text><text x="795" y="295">+</text></g><text x="600" y="460" fill="#d8eefc" font-size="23">Also define scope, benign alternatives, and disconfirming evidence</text></g></svg>
