<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Threat hunting lifecycle"><rect width="1200" height="630" fill="#071827"/><g font-family="Arial" text-anchor="middle"><text x="600" y="65" fill="white" font-size="38" font-weight="700">Every hunt phase produces a deliverable</text><g fill="#123653" stroke="#38bdf8" stroke-width="3"><rect x="45" y="230" width="165" height="120" rx="16"/><rect x="235" y="230" width="165" height="120" rx="16"/><rect x="425" y="230" width="165" height="120" rx="16"/><rect x="615" y="230" width="165" height="120" rx="16"/><rect x="805" y="230" width="165" height="120" rx="16"/><rect x="995" y="230" width="165" height="120" rx="16"/></g><g fill="white" font-size="19" font-weight="700"><text x="127" y="285">Hypothesis</text><text x="317" y="275">Data &amp;</text><text x="317" y="305">scope</text><text x="507" y="285">Execute</text><text x="697" y="285">Analyze</text><text x="887" y="275">Escalate</text><text x="887" y="305">or close</text><text x="1077" y="285">Improve</text></g><path d="M1077 380C1077 520 127 520 127 380" fill="none" stroke="#fbbf24" stroke-width="6"/><text x="600" y="485" fill="#fbbf24" font-size="22">The improvement becomes input to the next hunt</text></g></svg>
